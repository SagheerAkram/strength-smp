# ─── Weapon Binding System ──────────────────────────────────────────────
bind-system:
  enabled: true
  cost-strength: 3
  formatted-lore-prefix: "&d&l⚡ BOUND WEAPON ⚡"
  animation-ticks: 40           # Duration of loyalty-like flying weapon effect
  knockback-radius: 2.0         # Radius to push away blocking players/mobs
  knockback-strength: 1.5       # Horizontal knockback velocity
  
  # Active F/Q Bound Abilities
  abilities:
    cooldown-seconds: 25        # Default cooldown for all bound weapon F/Q abilities
    excalibur-beam-damage: 8.0  # Damage dealt by sword Excalibur Beam (4 hearts)
    dimensional-cleave-damage: 8.0 # Damage dealt by axe Dimensional Cleave (4 hearts)
    void-singularity-duration-ticks: 70 # Duration of gravity black hole (3.5 seconds)
    scorpion-hook-range: 14.0   # Maximum range for the crossbow hook
    poseidons-wrath-damage: 7.0 # Damage dealt by trident lightning strikes (3.5 hearts)
    force-field-radius: 6.0     # Radius of the shield kinetic blast


# ─── Crafting Recipes Configuration ──────────────────────────────────────
# You can customize the shape and ingredients for the custom recipes.
# Material names must match Bukkit Material enum names (e.g. NETHERITE_INGOT).
recipes:
  strength-item:
    shape:
      - "DPD"
      - "ESE"
      - "DND"
    ingredients:
      D: DIAMOND_BLOCK
      P: DIAMOND_PICKAXE
      E: ENDER_EYE
      S: NETHERITE_INGOT
      N: NETHER_STAR
  reroll-weapon:
    shape:
      - "DHD"
      - "SWS"
      - "DND"
    ingredients:
      D: DIAMOND
      H: TRIPWIRE_HOOK
      S: PRISMARINE_CRYSTALS
      W: WITHER_SKELETON_SKULL
      N: NETHER_STAR

# ─── Metrics & Tracking ──────────────────────────────────────────────────
# Tracks anonymous usage metrics (servers running the plugin, players sum).
# You can register your plugin on bstats.org to get your own plugin ID.
metrics:
  enabled: true
  plugin-id: 31813
