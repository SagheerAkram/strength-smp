# ═══════════════════════════════════════════════════════════════════════
# FLOKI STRENGTH SMP — CONFIGURATION FILE
# All values are hot-reloadable with /strengthsmp reload
# ═══════════════════════════════════════════════════════════════════════

# ─── Core Strength Settings ─────────────────────────────────────────────
strength:
  min: -10         # Minimum strength a player can reach
  max: 10          # Maximum strength a player can reach
  default: 0       # Starting strength for new players


  # On PvP kill: victim loses this many, attacker gets an item worth this many
  death-penalty: 1
  death-gain: 1
  # How strength is distributed on kill.
  # "DIRECT" = Added directly to the killer's strength.
  # "DROP"   = Dropped as a physical Strength Shard item on the ground at the victim's death location.
  kill-transfer-style: DROP

  # How bounty strength is distributed on claim.
  # "DIRECT" = Added directly to the killer's strength.
  # "DROP"   = Dropped as physical Strength Shard items on the ground at the victim's death location.
  # If not specified, it will fall back to the kill-transfer-style.
  bounty-transfer-style: DIRECT

  # Underdog rule: negative-strength player killing a high-strength player gains more
  underdog-multiplier: 2  # multiplied strength gain
  underdog-threshold: 3   # attacker must have at least this much more strength

# ─── Items ──────────────────────────────────────────────────────────────
