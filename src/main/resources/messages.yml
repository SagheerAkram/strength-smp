# Bounty System
bounty:
  set: "&x&F&F&0&0&0&0&l[КҷбҙҸбҙңЙҙбҙӣКҸ] &f%sender% &7бҙҳКҹбҙҖбҙ„бҙҮбҙ… бҙҖ &4%amount% &7sбҙӣКҖбҙҮЙҙЙўбҙӣКң КҷбҙҸбҙңЙҙбҙӣКҸ бҙҸЙҙ &c%target%!"
  claim: "&x&F&F&0&0&0&0&l[КҷбҙҸбҙңЙҙбҙӣКҸ] &f%player% &7бҙ„КҹбҙҖЙӘбҙҚбҙҮбҙ… бҙҖ &4%amount% &7sбҙӣКҖбҙҮЙҙЙўбҙӣКң КҷбҙҸбҙңЙҙбҙӣКҸ КҷКҸ бҙӢЙӘКҹКҹЙӘЙҙЙў &c%target%!"
  claim-bonus-skip: "&7&o(( Normal kill strength suppressed since a bounty was claimed ))"

# Monarch System
monarch:
  new: "&x&F&F&D&7&0&0&l[бҙҚбҙҸЙҙбҙҖКҖбҙ„Кң] &f%player% &7ЙӘs бҙӣКңбҙҮ ЙҙбҙҮбҙЎ sбҙҮКҖбҙ бҙҮКҖ бҙҚбҙҸЙҙбҙҖКҖбҙ„Кң!"
  dethroned: "&x&F&F&D&7&0&0&l[бҙҚбҙҸЙҙбҙҖКҖбҙ„Кң] &f%player% &7КңбҙҖs КҷбҙҮбҙҮЙҙ бҙ…бҙҮбҙӣКңКҖбҙҸЙҙбҙҮбҙ…!"

# Seasons & Contracts
