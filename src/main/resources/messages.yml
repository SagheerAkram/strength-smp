  day: "&x&0&0&F&F&A&A&l[sбҙҮбҙҖsбҙҸЙҙ] &fбҙ„бҙңКҖКҖбҙҮЙҙбҙӣ sбҙҮбҙҖsбҙҸЙҙ бҙ…бҙҖКҸ: &b%day%"
contract:
  complete: "&x&F&F&A&A&0&0&l[бҙ„бҙҸЙҙбҙӣКҖбҙҖбҙ„бҙӣ] &fКҸбҙҸбҙң'бҙ бҙҮ бҙ„бҙҸбҙҚбҙҳКҹбҙҮбҙӣбҙҮбҙ… бҙҖ бҙ…бҙҖЙӘКҹКҸ бҙ„бҙҸЙҙбҙӣКҖбҙҖбҙ„бҙӣ! &7КҖбҙҮбҙЎбҙҖКҖбҙ…: &e+%reward% sбҙӣКҖ"

